# ── Bluetooth ──────────────────────────────────────────────────────────────────
# Nordic UART Service (NUS) — see src/ble_service.c for the command protocol.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="BL-LED"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_NUS=y

# Use Zephyr's software link layer instead of Nordic's SoftDevice Controller.
#
# With the SDC, merely REFERENCING bt_enable() crashes this board at boot,
# before main() and before USB — reason 19, K_ERR_ARM_MEM_DATA_ACCESS. Note
# it is the reference, not the call: with --gc-sections, not calling
# bt_enable() lets the linker drop the whole stack INCLUDING its SYS_INIT
# entries, which is why "BT compiled in but not started" appeared to work.
#
# The SDC brings up MPSL at boot; the software controller does not, so this
# swaps out the entire suspect subsystem.
CONFIG_BT_CTLR=y
CONFIG_BT_LL_SW_SPLIT=y

# Nordic's CC310 crypto library fails to link against picolibc with this
# toolchain (undefined memmove / bad ARM-Thumb relocation). Nothing here needs
# it: no pairing, no encryption, no privacy — just an unauthenticated NUS
# link on a hobby LED controller.
CONFIG_HW_CC3XX=n
CONFIG_BT_CTLR_LE_ENC=n

# Entropy from the plain nRF RNG peripheral rather than CC310 — the CC3XX
# entropy driver needs nrfxlib headers that come with the crypto library
# disabled above.
CONFIG_ENTROPY_CC3XX=n
CONFIG_ENTROPY_NRF5_RNG=y

# NUS allocates its buffers from the system heap.
CONFIG_HEAP_MEM_POOL_SIZE=2048

# ── USB CDC console ────────────────────────────────────────────────────────────
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="BL-LED"
CONFIG_USB_DEVICE_VID=0x239A
CONFIG_USB_DEVICE_PID=0x0101
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# ── GPIO (onboard LED, used as a liveness heartbeat) ──────────────────────────
CONFIG_GPIO=y

# ── LED ring ───────────────────────────────────────────────────────────────────
# Driven over I2S, NOT SPI: every SPI transfer on this board — down to a single
# byte, on both SPIM1 and SPIM3, with the ring disconnected — crashes the CPU
# with K_ERR_ARM_MEM_DATA_ACCESS. That fault is unexplained; I2S avoids it.
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_I2S=y

# Must be explicit: the ws2812-i2s node references the I2S controller by
# phandle rather than sitting on an i2s bus, so the driver's automatic
# "select I2S" does not trigger and the device never gets instantiated.
CONFIG_I2S=y
CONFIG_I2S_NRFX=y

# ── Output format ──────────────────────────────────────────────────────────────
# Produces build/zephyr/zephyr.uf2 for drag-and-drop flashing onto the board.
CONFIG_BUILD_OUTPUT_UF2=y

# Use code_partition from DTS (starts at 0x1000, after the bootloader's MBR).
CONFIG_USE_DT_CODE_PARTITION=y

# ── Thread / stack sizes ───────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=2048

# ── Logging ────────────────────────────────────────────────────────────────────
# Minimal mode routes log output straight to printk, synchronously.
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y

# NOTE: CONFIG_ARM_MPU=n was tried during bring-up and does NOT boot on this
# SoC. Leave the MPU at its default (enabled).

# ── Stack sizes: the root cause was a STACK OVERFLOW ─────────────────────────
#
# Both failures on this board — any SPI transfer, and bt_enable() — were the
# same bug. Proof came from toggling the MPU stack guard and watching the
# fault code change:
#
#   guards ON  -> K_ERR_ARM_MEM_DATA_ACCESS (19): the MPU trapped a write into
#                 the guard region, i.e. it caught the overflow cleanly.
#   guards OFF -> K_ERR_ARM_USAGE_ILLEGAL_EPSR (35): nothing caught it, the
#                 stack was corrupted, and a return jumped to garbage.
#
# That is a stack overflow, and HW_STACK_PROTECTION was reporting it correctly
# — it must stay ON. It is a diagnosis, not the disease.
#
# NOT main's stack: MAIN_STACK_SIZE=8192 was tried against the SPI fault and
# changed nothing. Both failing paths do their work in INTERRUPT context, and
# ISR_STACK_SIZE defaults to only 2048.
CONFIG_HW_STACK_PROTECTION=y
CONFIG_ISR_STACK_SIZE=4096
